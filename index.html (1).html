<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MARTEAM QUIZZES</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; }
  body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
  #quiz-wrap { background: #ffffff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h1 { text-align: center; font-size: 20px; color: #333; margin-bottom: 1.2rem; }
  #counters { display: flex; gap: 12px; margin-bottom: 1rem; }
  .counter-card { flex: 1; border-radius: 10px; padding: 10px; text-align: center; min-width: 0; }
  .counter-card.good { background: #EAF3DE; border: 1px solid #639922; }
  .counter-card.bad { background: #FCEBEB; border: 1px solid #E24B4A; }
  .counter-label { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .counter-card.good .counter-label { color: #3B6D11; }
  .counter-card.bad .counter-label { color: #791F1F; }
  .counter-num { font-size: 26px; font-weight: 700; }
  .counter-card.good .counter-num { color: #27500A; }
  .counter-card.bad .counter-num { color: #A32D2D; }
  #question { font-size: 32px; font-weight: 600; text-align: center; color: #222; margin: 0 0 1.2rem; letter-spacing: 1px; word-break: break-word; }
  #timer-bar-wrap { height: 8px; background: #e0e0e0; border-radius: 999px; margin-bottom: 0.4rem; overflow: hidden; }
  #timer-bar { height: 100%; border-radius: 999px; transition: width 1s linear, background 0.3s; }
  #timer-label { font-size: 13px; color: #888; text-align: right; margin-bottom: 1.2rem; }
  .opts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .opt { background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; padding: 10px 4px; font-size: 16px; font-weight: 600; text-align: center; cursor: pointer; color: #333; transition: background 0.15s, border-color 0.15s; min-width: 0; }
  .opt:hover { background: #eef2ff; border-color: #aab4f0; }
  .opt.wrong { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
  .opt.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
  #btn-reset { width: 100%; margin-bottom: 0.8rem; padding: 10px; font-size: 15px; font-weight: 600; border-radius: 10px; border: 1px solid #ddd; background: #f4f6f9; color: #333; cursor: pointer; transition: background 0.15s; }
  #btn-reset:hover { background: #e8eaf0; }
  #qty-selector { display: flex; gap: 8px; }
  .qty-btn { flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600; border-radius: 10px; border: 1px solid #ddd; background: #f4f6f9; color: #666; cursor: pointer; transition: background 0.15s; min-width: 0; }
  .qty-btn:hover { background: #e8eaf0; }
  .qty-btn.active { background: #E6F1FB; border-color: #378ADD; color: #0C447C; }
  #qty-label { font-size: 13px; color: #888; text-align: center; margin-top: 0.5rem; }
</style>
</head>
<body>
<div id="quiz-wrap">
  <h1>MARTEAM QUIZZES</h1>
  <div id="counters">
    <div class="counter-card good"><div class="counter-label">Correctas</div><div class="counter-num" id="cnt-correct">0</div></div>
    <div class="counter-card bad"><div class="counter-label">Incorrectas</div><div class="counter-num" id="cnt-wrong">0</div></div>
  </div>
  <div id="question"></div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="timer-label"></div>
  <div class="opts" id="opts"></div>
  <button id="btn-reset">🔄 Reiniciar</button>
  <div id="qty-selector">
    <button class="qty-btn active" id="qty-10">10 preguntas</button>
    <button class="qty-btn" id="qty-25">25 preguntas</button>
    <button class="qty-btn" id="qty-40">40 preguntas</button>
  </div>
  <div id="qty-label"></div>
</div>
<script>
const TOTAL_TIME = 20;
let timer, timeLeft, cntCorrect = 0, cntWrong = 0, answered = false, totalQty = 10, qNum = 0, gameOver = false, current;

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i); [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function genQuestion() {
  const a = randInt(2, 9), b = randInt(2, 9), correct = a * b;
  const opts = new Set([correct]);
  while (opts.size < 15) {
    const v = correct + randInt(-15, 15);
    if (v !== correct && v > 0) opts.add(v);
  }
  return { a, b, correct, opts: shuffle([...opts]) };
}

function updateStats() {
  // stats ocultos
}

function setQuestion(showAnswer) {
  const ans = showAnswer !== undefined ? showAnswer : '?';
  const prog = gameOver ? '' : ` (${qNum}/${totalQty})`;
  document.getElementById('question').textContent = `${current.a} × ${current.b} = ${ans}${prog}`;
}

function startQuestion() {
  if (qNum >= totalQty) { showFinish(); return; }
  qNum++;
  answered = false;
  current = genQuestion();
  setQuestion();
  renderOpts();
  startTimer();
  document.getElementById('qty-label').textContent = `Pregunta ${qNum} de ${totalQty}`;
}

function renderOpts() {
  const el = document.getElementById('opts');
  el.innerHTML = '';
  current.opts.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = val;
    btn.onclick = () => pick(btn, val);
    el.appendChild(btn);
  });
}

function pick(btn, val) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  if (val === current.correct) {
    btn.classList.add('correct');
    cntCorrect++;
    document.getElementById('cnt-correct').textContent = cntCorrect;
    setQuestion(current.correct);
  } else {
    btn.classList.add('wrong');
    cntWrong++;
    document.getElementById('cnt-wrong').textContent = cntWrong;
    setQuestion(current.correct);
    highlightCorrect();
  }
  updateStats();
  setTimeout(startQuestion, 1400);
}

function highlightCorrect() {
  document.querySelectorAll('.opt').forEach(b => {
    if (parseInt(b.textContent) === current.correct) b.classList.add('correct');
  });
}

function startTimer() {
  timeLeft = TOTAL_TIME;
  updateBar();
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    updateBar();
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) {
        answered = true;
        cntWrong++;
        document.getElementById('cnt-wrong').textContent = cntWrong;
        setQuestion(current.correct);
        highlightCorrect();
        updateStats();
        setTimeout(startQuestion, 1400);
      }
    }
  }, 1000);
}

function updateBar() {
  const pct = (timeLeft / TOTAL_TIME) * 100;
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? '#639922' : pct > 25 ? '#EF9F27' : '#E24B4A';
  document.getElementById('timer-label').textContent = `${timeLeft}s`;
}

function showFinish() {
  gameOver = true;
  clearInterval(timer);
  document.getElementById('timer-bar').style.width = '0%';
  document.getElementById('timer-label').textContent = '';
  document.getElementById('question').textContent = '¡Juego terminado!';
  document.getElementById('qty-label').textContent = `Correctas: ${cntCorrect} | Incorrectas: ${cntWrong}`;
  document.getElementById('opts').innerHTML = '';
}

function resetGame() {
  clearInterval(timer);
  cntCorrect = 0; cntWrong = 0; qNum = 0; gameOver = false;
  document.getElementById('cnt-correct').textContent = 0;
  document.getElementById('cnt-wrong').textContent = 0;
  document.getElementById('timer-bar').style.width = '100%';
  updateStats();
  startQuestion();
}

document.getElementById('qty-10').onclick = function() { setQty(10, this); };
document.getElementById('qty-25').onclick = function() { setQty(25, this); };
document.getElementById('qty-40').onclick = function() { setQty(40, this); };
document.getElementById('btn-reset').onclick = resetGame;

function setQty(n, btn) {
  totalQty = n;
  document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetGame();
}

startQuestion();
</script>
</body>
</html>
