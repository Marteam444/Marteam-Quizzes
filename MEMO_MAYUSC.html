<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria: Abecedario</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-back: #6c5ce7;
            --card-front: #ffffff;
            --text-color: #2d3436;
            --accent-color: #00cec9;
            --success-color: #00b894;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            margin-bottom: 20px;
            color: #636e72;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stat-item span {
            color: var(--card-back);
            font-variant-numeric: tabular-nums;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            max-width: 550px;
            width: 100%;
        }

        @media (max-width: 500px) {
            .game-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
        }

        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            box-shadow: 0 0 0 3px var(--success-color);
            transform: rotateY(180deg) scale(0.95);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0);
            background-size: 10px 10px;
        }

        .card-front {
            background-color: var(--card-front);
            color: var(--card-back);
            transform: rotateY(180deg);
            border: 1px solid #eee;
        }

        /* Colores aleatorios para las letras */
        .letter-color-1 { color: #e84393; }
        .letter-color-2 { color: #0984e3; }
        .letter-color-3 { color: #6c5ce7; }
        .letter-color-4 { color: #00b894; }
        .letter-color-5 { color: #d63031; }
        .letter-color-6 { color: #e17055; }
        .letter-color-7 { color: #fdcb6e; }
        .letter-color-8 { color: #2d3436; }

        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 52, 54, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            color: var(--success-color);
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .modal-stats {
            margin: 20px 0;
            font-size: 1.1rem;
            color: #636e72;
            line-height: 1.6;
        }

        .btn {
            background: var(--card-back);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(108, 92, 231, 0.2);
        }

        .btn:hover {
            background: #5b4bc4;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(108, 92, 231, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .controls {
            margin-top: 30px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .matched .card-inner {
            animation: pulse 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <h1>LETRAS MAYÚSCULAS</h1>
    <p class="subtitle">Encuentra los 10 pares del abecedario</p>

    <div class="stats">
        <div class="stat-item">Movimientos: <span id="moves">0</span></div>
        <div class="stat-item">Tiempo: <span id="timer">00:00</span></div>
    </div>

    <div class="game-container" id="game-board">
        <!-- Generado por JS -->
    </div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">Nuevo Juego</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2>¡Increíble!</h2>
            <div class="modal-stats" id="final-stats"></div>
            <button class="btn" onclick="resetGame()">Jugar de Nuevo</button>
        </div>
    </div>

    <script>
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let selectedLetters = [];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timerInterval;
        let seconds = 0;
        let isLockBoard = false;
        let gameStarted = false;

        function initGame() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            
            // Seleccionar 10 letras aleatorias del abecedario
            const shuffledAlphabet = [...alphabet].sort(() => Math.random() - 0.5);
            selectedLetters = shuffledAlphabet.slice(0, 10);

            // Duplicar para crear pares y mezclar
            const gameCards = [...selectedLetters, ...selectedLetters]
                .sort(() => Math.random() - 0.5);

            gameCards.forEach((letter, index) => {
                const colorClass = `letter-color-${(letter.charCodeAt(0) % 8) + 1}`;
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.letter = letter;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front ${colorClass}">${letter}</div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });

            resetStats();
        }

        function flipCard() {
            if (isLockBoard) return;
            if (this === flippedCards[0]) return;
            if (this.classList.contains('matched')) return;

            // Iniciar cronómetro al primer clic
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.letter === card2.dataset.letter;

            if (isMatch) {
                markAsMatched();
            } else {
                unflipCards();
            }
        }

        function markAsMatched() {
            // Esperar un poco para que el jugador vea la segunda tarjeta volteada
            setTimeout(() => {
                flippedCards[0].classList.add('matched');
                flippedCards[1].classList.add('matched');
                matchedPairs++;
                
                if (matchedPairs === 10) {
                    setTimeout(showWinModal, 600);
                }
                
                resetTurn();
            }, 500);
        }

        function unflipCards() {
            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');
                resetTurn();
            }, 1000);
        }

        function resetTurn() {
            flippedCards = [];
            isLockBoard = false;
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function resetStats() {
            moves = 0;
            matchedPairs = 0;
            seconds = 0;
            gameStarted = false;
            isLockBoard = false;
            flippedCards = [];
            clearInterval(timerInterval);
            document.getElementById('moves').textContent = '0';
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('modal').style.display = 'none';
        }

        function showWinModal() {
            clearInterval(timerInterval);
            const timeStr = document.getElementById('timer').textContent;
            document.getElementById('final-stats').innerHTML = `
                Has encontrado todos los pares en <br>
                <strong>${moves} movimientos</strong> y un tiempo de <strong>${timeStr}</strong>.
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function resetGame() {
            initGame();
        }

        // Iniciar al cargar
        window.onload = initGame;
    </script>
</body>
</html>
